name: burn_guard_app
description: AI-Powered Burn Assessment App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # Permissions
  permission_handler: ^11.3.1

  # AI / ML
  tflite_flutter: ^0.10.4

  # State management
  flutter_riverpod: ^2.5.1

  # Storage & files
  path_provider: ^2.1.4

  # Navigation
  go_router: ^14.0.0

  # Utilities
  url_launcher: ^6.3.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/models/model_ver2.tflite
    - assets/fonts/
